function parseCSV(text) {
  // Robust CSV parser: handles quoted fields, commas inside quotes, escaped quotes,
  // and CRLF / LF line endings. Returns array of arrays.
  const rows = [];
  let row = [], field = "", inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i], next = text[i+1];
    if (inQuotes) {
      if (c === '"' && next === '"') { field += '"'; i++; }
      else if (c === '"') { inQuotes = false; }
      else { field += c; }
    } else {
      if (c === '"') { inQuotes = true; }
      else if (c === ',') { row.push(field); field = ""; }
      else if (c === '\n' || c === '\r') {
        if (c === '\r' && next === '\n') i++;
        row.push(field); rows.push(row); row = []; field = "";
      } else { field += c; }
    }
  }
  if (field.length > 0 || row.length > 0) { row.push(field); rows.push(row); }
  return rows.filter(r => r.some(c => c && c.trim().length));
}

function importPeopleFromText(text) {
  const rows = parseCSV(text);
  if (rows.length === 0) return { added: 0, skipped: 0, errors: ["No rows found."] };

  // detect header row
  const first = rows[0].map(c => c.trim().toLowerCase());
  const looksLikeHeader = first.some(c => ["email","name","full name","role","title","mentor"].includes(c));
  let headers, dataRows;
  if (looksLikeHeader) {
    headers = first;
    dataRows = rows.slice(1);
  } else {
    // assume order: email, name, role, mentor
    headers = ["email","name","role","mentor"];
    dataRows = rows;
  }

  const idx = {
    email: headers.findIndex(h => h === "email"),
    name: headers.findIndex(h => h === "name" || h === "full name"),
    role: headers.findIndex(h => h === "role" || h === "title"),
    mentor: headers.findIndex(h => h === "mentor"),
  };
  if (idx.email === -1) {
    return { added: 0, skipped: 0, errors: ['Missing "email" column. Required columns: email, name. Optional: role, mentor.'] };
  }
  if (idx.name === -1) {
    return { added: 0, skipped: 0, errors: ['Missing "name" column. Required columns: email, name. Optional: role, mentor.'] };
  }

  const existingEmails = new Set(state.people.map(p => normalizeEmail(p.email)).filter(Boolean));
  const errors = [];
  const newPeople = [];
  dataRows.forEach((r, i) => {
    const lineNo = i + (looksLikeHeader ? 2 : 1);
    const email = (r[idx.email] || "").trim();
    const name = (r[idx.name] || "").trim();
    if (!email) { errors.push(`Row ${lineNo}: missing email`); return; }
    if (!isValidEmail(email)) { errors.push(`Row ${lineNo}: "${email}" doesn't look like a valid email, skipped`); return; }
    if (!name) { errors.push(`Row ${lineNo}: missing name`); return; }
    const normEmail = normalizeEmail(email);
    if (existingEmails.has(normEmail)) { errors.push(`Row ${lineNo}: email "${email}" already exists, skipped`); return; }
    const role = idx.role >= 0 ? (r[idx.role] || "").trim() : "";
    const mentor = idx.mentor >= 0 ? (r[idx.mentor] || "").trim() : "";
    existingEmails.add(normEmail);
    newPeople.push({
      id: "p_" + Date.now() + "_" + i,
      email: normEmail, name, role, mentor,
      cycleStart: Date.now()
    });
  });
  return { added: newPeople.length, skipped: errors.length, errors, newPeople };
}

function downloadTemplateCSV() {
  const csv = "email,name,role,mentor\n" +
    "aarav.mehta@altudo.co,Aarav Mehta,Senior Consultant,Priya Nair\n" +
    "diya.sharma@altudo.co,Diya Sharma,Manager,Rohan Kapoor\n";
  const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "evp_roster_template.csv";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

        saveState();

}

function buildSurveyLink(email) {
  try {
    const url = new URL(window.location.href);
    url.search = "";
    if (email) url.searchParams.set("email", email);
    return url.toString();
  } catch {
    return email ? "?email=" + encodeURIComponent(email) : "(local file)";
  }
}

function copyToClipboard(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).catch(() => fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
}
function fallbackCopy(text) {
  const ta = document.createElement("textarea");
  ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
  document.body.appendChild(ta); ta.select();
  try { document.execCommand("copy"); } catch {}
  document.body.removeChild(ta);
}

        <input type="password" class="input" data-fc="admin.password" id="admin-pw-editor" value="${esc(c.admin?.password || "")}" autocomplete="new-password" style="flex:1;font-family:monospace">
        <button type="button" class="btn-ghost-sm" id="admin-pw-show">Show</button>
      </div>
    </div>

    <div class="section">
      <div class="section-head"><h3 class="h3">Power Automate sync</h3></div>
      <p style="font-size:12.5px;color:var(--ink-faint);margin:0 0 12px;line-height:1.5">
        HTTP trigger URL from your Power Automate flow. When set, every form submission is also sent to this URL, which appends a row to the linked Excel file.
        Leave blank to disable sync (submissions still save locally). Paste the full URL including the <code>?api-version=…&amp;sig=…</code> query string.
      </p>
      <textarea class="ta" data-fc="admin.powerAutomateUrl" id="pa-url-editor" placeholder="https://prod-XX.westus.logic.azure.com/workflows/…" style="min-height:70px;font-family:monospace;font-size:12px;word-break:break-all">${esc(c.admin?.powerAutomateUrl || "")}</textarea>
      <div style="display:flex;gap:8px;align-items:center;margin-top:10px">
        <button type="button" class="btn-ghost-sm" id="pa-test-btn">${ICONS.check || ""} Send test row</button>
        <span id="pa-test-status" style="font-size:12.5px;color:var(--ink-faint)"></span>
      </div>
    </div>

    <div style="font-size:12.5px;color:var(--ink-faint);text-align:center;margin-top:14px">Changes save the moment you click out of a field.</div>
  `;

  // Wire field-bind: any element with data-fc="path.to.value"
  node.querySelectorAll("[data-fc]").forEach(input => {
    input.addEventListener("blur", () => {
      const path = input.dataset.fc.split(".");
      let obj = state.content;
      for (let i = 0; i < path.length - 1; i++) obj = obj[path[i]];
      obj[path[path.length - 1]] = input.value;
      saveState();
      flash("Saved.");
    });
  });

  // Reset intro
  node.querySelector("#reset-intro").addEventListener("click", () => {
    if (!confirm("Reset the intro page text and blocks to the default? Your existing edits will be lost.")) return;
    state.content.intro = defaultContent().intro;
    saveState();
    flash("Intro reset.");
    render();
  });

  // Reset identify page
  node.querySelector("#reset-identify").addEventListener("click", () => {
    if (!confirm("Reset the identify page text to the default? Your existing edits will be lost.")) return;
    state.content.identify = defaultContent().identify;
    saveState();
    flash("Identify page reset.");
    render();
  });

  // Admin password show/hide toggle
  const pwShow = node.querySelector("#admin-pw-show");
  const pwEditor = node.querySelector("#admin-pw-editor");
  if (pwShow && pwEditor) {
    pwShow.addEventListener("click", () => {
      const showing = pwEditor.type === "text";
      pwEditor.type = showing ? "password" : "text";
      pwShow.textContent = showing ? "Show" : "Hide";
    });
  }

  // Power Automate test button — sends a fake submission with sample values
  // so you can verify the URL / mapping / Excel connection without waiting
  // for a real employee to fill out the form.
  const paTestBtn = node.querySelector("#pa-test-btn");
  const paStatus = node.querySelector("#pa-test-status");
  if (paTestBtn && paStatus) {
    paTestBtn.addEventListener("click", async () => {
      const url = (node.querySelector("#pa-url-editor")?.value || "").trim();
      if (!url) {
        paStatus.textContent = "Enter a URL first.";
        paStatus.style.color = "var(--flag)";
        return;
      }
      paStatus.textContent = "Sending test row…";
      paStatus.style.color = "var(--ink-faint)";
      const payload = {
        submittedAt: new Date().toISOString(),
        email: "test@altudo.co",
        name: "Test Submission",
        role: "Test",
        mentor: "—",
        career:   { rank: 1, sat: 5, comment: "test career comment" },
        learning: { rank: 2, sat: 7, comment: "" },
        people:   { rank: 3, sat: 8, comment: "" },
        culture:  { rank: 4, sat: 8, comment: "" },
        rewards:  { rank: 5, sat: 6, comment: "test rewards comment" },
        work:     { rank: 6, sat: 7, comment: "" },
      };
      try {
        const r = await fetch(url, {
          method: "POST",
          // Same CORS workaround as the real submission path — see comment
          // in sendSubmissionToPowerAutomate().
          headers: { "Content-Type": "text/plain;charset=UTF-8" },
          body: JSON.stringify(payload),
          mode: "no-cors",
        });
        // With mode:'no-cors' r.status is always 0 and r.ok is always false —
        // we can't tell success from failure at the network level. So we
        // assume the flow received it and tell the user to check Excel.
        paStatus.textContent = "Test row sent. Check your Excel in ~30 seconds — if a row appears, everything's wired up correctly.";
        paStatus.style.color = "var(--ok)";
      } catch (e) {
        paStatus.textContent = "Network error — " + (e.message || "unknown");
        paStatus.style.color = "var(--flag)";
      }
    });
  }

  // Render blocks (intro)
  wireBlockEditor(node, "intro",    "blocks-area",          "add-block",          "the intro page");
  wireBlockEditor(node, "identify", "identify-blocks-area", "identify-add-block", "the identify page");
  wireBlockEditor(node, "survey",   "survey-blocks-area",   "survey-add-block",   "the survey page");
  wireBlockEditor(node, "thanks",   "thanks-blocks-area",   "thanks-add-block",   "the thank-you page");
  wirePillarsListEditor(node);
  wireExampleRowsEditor(node);

  return node;
}

/*
 * Reusable block editor wiring. Given a section key (intro/identify/survey/thanks)
 * and DOM IDs for the render area + add button, wires everything: row rendering,
 * inputs, up/down, delete, add. Called once per section from renderFormEditor.
 */
function wireBlockEditor(node, sectionKey, areaId, addBtnId, sectionLabel) {
  const blocksArea = node.querySelector("#" + areaId);
  if (!blocksArea) return;

  function refreshBlocks() {
    const blocks = state.content[sectionKey].blocks || [];
    blocksArea.innerHTML = "";
    if (!blocks.length) {
      blocksArea.innerHTML = `<div style="padding:14px;color:var(--ink-faint);font-size:12.5px;text-align:center;background:var(--bg);border-radius:8px;border:1px dashed var(--line)">No blocks yet. Click "Add a block" below to create one.</div>`;
      return;
    }
    blocks.forEach((block, idx) => {
      const row = el(`<div style="padding:14px;background:var(--bg);border-radius:10px;border:1px solid var(--line);margin-bottom:8px">
        <div style="display:grid;grid-template-columns:110px 1fr auto auto auto;gap:10px;align-items:start">
          <input class="input" data-bk="icon" data-i="${idx}" value="${esc(block.icon || "")}" placeholder="icon">
          <input class="input" data-bk="heading" data-i="${idx}" value="${esc(block.heading || "")}" placeholder="Heading">
          <button class="btn-icon" data-up="${idx}" ${idx===0?'disabled style="opacity:.4"':''} title="Move up">▲</button>
          <button class="btn-icon" data-down="${idx}" ${idx===blocks.length-1?'disabled style="opacity:.4"':''} title="Move down">▼</button>
          <button class="btn-icon danger" data-rm="${idx}" title="Remove">${ICONS.trash}</button>
        </div>
        <textarea class="ta" data-bk="body" data-i="${idx}" style="margin-top:8px" placeholder="Body text">${esc(block.body || "")}</textarea>
      </div>`);
      row.querySelectorAll("[data-bk]").forEach(inp => {
        inp.addEventListener("blur", () => {
          const i = Number(inp.dataset.i);
          state.content[sectionKey].blocks[i][inp.dataset.bk] = inp.value;
          saveState();
          flash("Saved.");
        });
      });
      row.querySelector(`[data-up="${idx}"]`).addEventListener("click", (e) => {
        if (e.currentTarget.disabled) return;
        const i = idx;
        const arr = state.content[sectionKey].blocks;
        [arr[i-1], arr[i]] = [arr[i], arr[i-1]];
        saveState(); refreshBlocks();
      });
      row.querySelector(`[data-down="${idx}"]`).addEventListener("click", (e) => {
        if (e.currentTarget.disabled) return;
        const i = idx;
        const arr = state.content[sectionKey].blocks;
        [arr[i+1], arr[i]] = [arr[i], arr[i+1]];
        saveState(); refreshBlocks();
      });
      row.querySelector(`[data-rm="${idx}"]`).addEventListener("click", () => {
        if (!confirm(`Remove this block from ${sectionLabel}?`)) return;
        state.content[sectionKey].blocks.splice(idx, 1);
        saveState(); refreshBlocks(); flash("Block removed.");
      });
      blocksArea.appendChild(row);
    });
  }
  refreshBlocks();

  const addBtn = node.querySelector("#" + addBtnId);
  if (addBtn) {
    addBtn.addEventListener("click", () => {
      if (!Array.isArray(state.content[sectionKey].blocks)) state.content[sectionKey].blocks = [];
      state.content[sectionKey].blocks.push({ id: "b_" + Date.now(), icon: "bulb", heading: "New block", body: "Add your content here." });
      saveState(); refreshBlocks();
      const last = blocksArea.lastChild;
      if (last && last.scrollIntoView) last.scrollIntoView({ behavior: "smooth", block: "center" });
    });
  }
}

/*
 * Pillar list editor for the intro page. Each row lets People Ops edit a
 * single pill label with move-up / move-down / remove controls, and there's
 * an "Add a pillar" button below. Modifies state.content.intro.pillars in
 * place and persists via saveState on every change.
 */
function wirePillarsListEditor(node) {
  const area = node.querySelector("#pillars-list-area");
  if (!area) return;
  function refresh() {
    const pills = state.content.intro.pillars || [];
    area.innerHTML = "";
    if (!pills.length) {
      area.innerHTML = `<div style="padding:14px;color:var(--ink-faint);font-size:12.5px;text-align:center;background:var(--bg);border-radius:8px;border:1px dashed var(--line)">No pillars yet. Click "Add a pillar" to create one.</div>`;
      return;
    }
    pills.forEach((label, idx) => {
      const row = el(`<div style="padding:12px;background:var(--bg);border-radius:8px;border:1px solid var(--line);margin-bottom:8px;display:grid;grid-template-columns:1fr auto auto auto;gap:10px;align-items:center">
        <input class="input" value="${esc(label)}" placeholder="Pillar name">
        <button class="btn-icon" data-up="${idx}" ${idx===0?'disabled style="opacity:.4"':''} title="Move up">▲</button>
        <button class="btn-icon" data-down="${idx}" ${idx===pills.length-1?'disabled style="opacity:.4"':''} title="Move down">▼</button>
        <button class="btn-icon danger" data-rm="${idx}" title="Remove">${ICONS.trash}</button>
      </div>`);
      row.querySelector("input").addEventListener("blur", (e) => {
        state.content.intro.pillars[idx] = e.target.value;
        saveState(); flash("Saved.");
      });
      row.querySelector(`[data-up="${idx}"]`).addEventListener("click", (e) => {
        if (e.currentTarget.disabled) return;
        const arr = state.content.intro.pillars;
        [arr[idx-1], arr[idx]] = [arr[idx], arr[idx-1]];
        saveState(); refresh();
      });
      row.querySelector(`[data-down="${idx}"]`).addEventListener("click", (e) => {
        if (e.currentTarget.disabled) return;
        const arr = state.content.intro.pillars;
        [arr[idx+1], arr[idx]] = [arr[idx], arr[idx+1]];
        saveState(); refresh();
      });
      row.querySelector(`[data-rm="${idx}"]`).addEventListener("click", () => {
        if (!confirm(`Remove "${state.content.intro.pillars[idx]}" from the pillar list?`)) return;
        state.content.intro.pillars.splice(idx, 1);
        saveState(); refresh(); flash("Pillar removed.");
      });
      area.appendChild(row);
    });
  }
  refresh();
  const addBtn = node.querySelector("#add-pillar");
  if (addBtn) addBtn.addEventListener("click", () => {
    if (!Array.isArray(state.content.intro.pillars)) state.content.intro.pillars = [];
    state.content.intro.pillars.push("New pillar");
    saveState(); refresh();
  });
}

/*
 * Editor for the "Example" table shown on the survey page. Each row has four
 * columns (pillar name, importance, satisfaction, comment) plus a "Comment
 * required" toggle that pink-highlights that row on the employee view. Same
 * add/move/remove pattern as the pillar editor.
 */
function wireExampleRowsEditor(node) {
  const area = node.querySelector("#example-rows-area");
  if (!area) return;
  function refresh() {
    const rows = (state.content.survey && state.content.survey.exampleRows) || [];
    area.innerHTML = "";
    if (!rows.length) {
      area.innerHTML = `<div style="padding:14px;color:var(--ink-faint);font-size:12.5px;text-align:center;background:var(--bg);border-radius:8px;border:1px dashed var(--line)">No example rows yet.</div>`;
      return;
    }
    rows.forEach((row, idx) => {
      const rowEl = el(`<div style="padding:12px;background:var(--bg);border-radius:8px;border:1px solid var(--line);margin-bottom:8px">
        <div style="display:grid;grid-template-columns:2fr 0.7fr 0.7fr auto auto auto;gap:8px;align-items:center;margin-bottom:8px">
          <input class="input" data-col="pillar"  value="${esc(row.pillar||"")}" placeholder="Pillar name">
          <input class="input" data-col="imp"     value="${esc(row.imp||"")}"    placeholder="Imp">
          <input class="input" data-col="sat"     value="${esc(row.sat||"")}"    placeholder="Sat">
          <button class="btn-icon" data-up="${idx}"   ${idx===0?'disabled style="opacity:.4"':''} title="Move up">▲</button>
          <button class="btn-icon" data-down="${idx}" ${idx===rows.length-1?'disabled style="opacity:.4"':''} title="Move down">▼</button>
          <button class="btn-icon danger" data-rm="${idx}" title="Remove">${ICONS.trash}</button>
        </div>
        <textarea class="ta" data-col="comment" style="min-height:50px" placeholder="Comment text">${esc(row.comment||"")}</textarea>
        <label style="display:flex;align-items:center;gap:8px;margin-top:6px;font-size:12.5px;color:var(--ink-soft);cursor:pointer">
          <input type="checkbox" data-col="required" ${row.required?'checked':''} style="cursor:pointer">
          Highlight this row as "Comment required"
        </label>
      </div>`);
      rowEl.querySelectorAll("[data-col]").forEach(inp => {
        inp.addEventListener(inp.type === "checkbox" ? "change" : "blur", (e) => {
          const col = e.target.dataset.col;
          const val = e.target.type === "checkbox" ? e.target.checked
                    : (col === "imp" || col === "sat") ? Number(e.target.value) || 0
                    : e.target.value;
          state.content.survey.exampleRows[idx][col] = val;
          saveState(); flash("Saved.");
        });
      });
      rowEl.querySelector(`[data-up="${idx}"]`).addEventListener("click", (e) => {
        if (e.currentTarget.disabled) return;
        const arr = state.content.survey.exampleRows;
        [arr[idx-1], arr[idx]] = [arr[idx], arr[idx-1]];
        saveState(); refresh();
      });
      rowEl.querySelector(`[data-down="${idx}"]`).addEventListener("click", (e) => {
        if (e.currentTarget.disabled) return;
        const arr = state.content.survey.exampleRows;
        [arr[idx+1], arr[idx]] = [arr[idx], arr[idx+1]];
        saveState(); refresh();
      });
      rowEl.querySelector(`[data-rm="${idx}"]`).addEventListener("click", () => {
        if (!confirm("Remove this example row?")) return;
        state.content.survey.exampleRows.splice(idx, 1);
        saveState(); refresh(); flash("Row removed.");
      });
      area.appendChild(rowEl);
    });
  }
  refresh();
  const addBtn = node.querySelector("#add-example-row");
  if (addBtn) addBtn.addEventListener("click", () => {
    if (!Array.isArray(state.content.survey.exampleRows)) state.content.survey.exampleRows = [];
    state.content.survey.exampleRows.push({ pillar: "New pillar", imp: 1, sat: 5, comment: "", required: false });
    saveState(); refresh();
  });
}

/* ===================== TAGGED INBOX ===================== */
function renderTagged() {
  const myTasks = state.tasks.filter(t => t.taggedTo === activeTagged);
  const open = myTasks.filter(t => t.status === "tagged");
  const responded = myTasks.filter(t => t.status === "responded");
  const closed = myTasks.filter(t => t.status === "completed");

  const node = el('<div class="admin-shell"></div>');
  node.innerHTML = `
    <header class="admin-header">
      <div class="brand">
        <div class="brand-mark">${ICONS.user_cog}</div>
        <div><div class="brand-name">${esc(activeTagged)}</div><div class="brand-sub">Tagged inbox</div></div>
      </div>
    </header>
    <main class="admin-main">
      <div class="page-head">
        <h1 class="page-title">Your inbox</h1>
        <p class="page-desc">Items People Ops has asked you to look into.</p>
      </div>
      <div id="inbox-area"></div>
    </main>
  `;
  const area = node.querySelector("#inbox-area");
  if (myTasks.length === 0) {
    area.innerHTML = '<div class="section"><div class="empty">No items have been tagged to you.</div></div>';
    return node;
  }
  if (open.length) area.appendChild(inboxSection("Awaiting your response", open, "mentor"));
  if (responded.length) area.appendChild(inboxSection("With People Ops to close", responded, "view"));
  if (closed.length) area.appendChild(inboxSection("Recently closed", closed.slice(0, 5), "view"));
  return node;
}
function inboxSection(title, items, mode) {
  const wrap = el(`<div class="section">
    <div class="section-head"><h3 class="h3">${esc(title)} (${items.length})</h3></div>
    <div class="task-list" data-list></div>
  </div>`);
  const list = wrap.querySelector("[data-list]");
  items.forEach(t => list.appendChild(renderTaskCard(t, mode)));
  return wrap;
}

/* ===================== INIT ===================== */
state = loadState();
saveState();

// Identity model: self-attested via email. There is no URL-based auto-identify
// any more — the employee opens the form (anyone with the link can), and the
// app asks them to confirm their email + name on the identify step.
// The optional `?email=...` URL parameter only pre-fills the identify form;
// the user still has to confirm it.
activeUserId = null;

/*
 * Admin access is via URL hash. Adding `#admin` to the end of the URL opens
 * the admin panel. Adding `#tagged` opens the mentor's tagged inbox. Anything
 * else (or nothing) shows the employee-facing form. This keeps the admin
 * surface hidden from casual visitors while giving People Ops a reliable
 * bookmark-able entry point.
 */
function readHashView() {
  const h = (window.location.hash || "").replace(/^#/, "").toLowerCase();
  if (h === "admin") return "admin";
  if (h === "tagged") return "tagged";
  return null;
}
function applyHashRoute() {
  const target = readHashView();
  if (target === "admin") {
    view = "admin";
    if (!adminTab) adminTab = "dashboard";
  } else if (target === "tagged") {
    view = "tagged";
  } else if (view === "admin" || view === "tagged") {
    // Hash was cleared while on an admin/tagged view — send back to landing
    view = "landing";
    activeUserId = null;
    identifyEmail = ""; identifyName = ""; identifyRole = ""; identifyErrors = [];
    // Sign out of admin whenever we leave the admin view so re-entering #admin
    // in the same tab prompts for the password again.
    adminAuthed = false;
    adminAuthError = "";
  }
  render();
}

window.addEventListener("hashchange", applyHashRoute);
applyHashRoute();
</script>
